      dl { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: .75rem; margin: 1.5rem 0 0; }
      div { border-left: 4px solid #f59e0b; border-radius: 8px; padding: .8rem; background: #f7fcff; }
      dt { color: #0369a1; font-size: .85rem; font-weight: 900; }
      dd { margin: .35rem 0 0; font-weight: 800; }
      @media (max-width: 620px) { dl { grid-template-columns: 1fr; } }
